name: Verify build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      PROGRAM_ID: 75vZMouaNixrw4zk1rohwMyHCkPZU7odD5crg6goWjM6
      BASE_IMAGE: solanafoundation/solana-verifiable-build:4.0.3
      UPLOADER_PUBKEY: ECZxA64kkySCWStTeWvx6HfVovdaqjUCL3r3gVaYtvyG
    steps:
      - uses: actions/checkout@v4

      - name: Install solana-verify
        run: |
          curl -sSfL -o /usr/local/bin/solana-verify \
            https://github.com/solana-foundation/solana-verifiable-build/releases/download/v0.5.1/solana-verify-0.5.1-linux
          chmod +x /usr/local/bin/solana-verify

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Write uploader keypair
        run: echo '${{ secrets.VERIFY_UPLOADER_KEYPAIR }}' > "$RUNNER_TEMP/uploader.json"

      - name: Configure Solana CLI defaults
        run: |
          solana config set --url mainnet-beta --keypair "$RUNNER_TEMP/uploader.json"
          solana config get

      # Build directly in the checkout too, so the exact canonical binary
      # can be downloaded as an artifact and deployed on-chain if the
      # currently-live program doesn't match it yet.
      - name: Build program (for artifact upload)
        run: solana-verify build --library-name portal --base-image "$BASE_IMAGE"

      - name: Upload built program as artifact
        uses: actions/upload-artifact@v4
        with:
          name: portal-so
          path: target/deploy/portal.so

      # Native amd64 build here matches OtterSec's remote build environment
      # exactly (unlike Apple Silicon + QEMU emulation), so this build's hash
      # should match the on-chain program before we even submit the job.
      - name: Build and upload verification PDA
        run: |
          solana-verify verify-from-repo \
            --program-id "$PROGRAM_ID" \
            "https://github.com/${{ github.repository }}" \
            --library-name portal \
            --base-image "$BASE_IMAGE" \
            --commit-hash "${{ github.sha }}" \
            --keypair "$RUNNER_TEMP/uploader.json" \
            -y

      - name: Submit remote verification job
        run: |
          solana-verify remote submit-job \
            --program-id "$PROGRAM_ID" \
            --uploader "$UPLOADER_PUBKEY"

      - name: Clean up keypair
        if: always()
        run: rm -f "$RUNNER_TEMP/uploader.json"
